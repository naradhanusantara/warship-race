<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warship Racing - Fixed Buttons</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(#0077be, #004d99); transition: background 2s; }
        canvas { display: block; position: absolute; top:0; left:0; z-index: 1; }
        
        #ui { position: absolute; top: 15px; left: 20px; color: white; font-size: 20px; font-weight: bold; z-index: 20; text-shadow: 2px 2px #000; display: none; }
        #coin-ui { color: #ffdd00; margin-top: 5px; }
        #player-hp-container { width: 250px; height: 15px; border: 2px solid #fff; background: #333; margin-top: 10px; border-radius: 8px; overflow: hidden; box-shadow: 0 0 5px #000; }
        #player-hp-fill { width: 100%; height: 100%; background: #00ffaa; transition: width 0.2s, background 0.2s; }
        
        #controls { position: absolute; right: 30px; bottom: 30px; display: none; flex-direction: column; gap: 20px; z-index: 100; }
        #action-controls { position: absolute; left: 30px; bottom: 30px; display: none; gap: 20px; z-index: 100; }

        .btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 35px; border: 4px solid white; cursor: pointer; pointer-events: auto; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.9); }
        
        /* Z-index ditingkatkan agar di atas canvas */
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 26, 51, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: white; text-align: center; }
        .hidden { display: none !important; }
        
        h1 { font-size: 36px; margin-bottom: 5px; text-shadow: 3px 3px #000; color: #00fbff; letter-spacing: 2px; }
        p { font-size: 18px; margin-bottom: 20px; color: #ddd; }
        
        .menu-btn { padding: 10px 25px; font-size: 16px; font-weight: bold; margin: 6px; color: white; border: 3px solid #fff; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s; width: 220px; pointer-events: auto; z-index: 210; }
        .primary-btn { background: #ff4444; } .secondary-btn { background: #0077be; } .gold-btn { background: #d4af37; color: #000; border-color: #ffd700; } .green-btn { background: #28a745; }
        .admin-btn { background: #8b0000; color: white; border-color: #ff4444; }
        .menu-btn:active { transform: scale(0.95); }
        
        input { padding: 12px; margin: 10px; width: 200px; font-size: 16px; border-radius: 8px; border: 2px solid #00fbff; background: #001a33; color: white; text-align: center; outline: none; }
        .data-box { background: rgba(0,0,0,0.6); border: 2px solid #00fbff; border-radius: 10px; width: 340px; max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding: 15px; }
        #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; display:none; justify-content:center; align-items:center; color:#00fbff; font-size:24px; font-weight:bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading-overlay">Menghubungkan ke Server...</div>

        <audio id="sfx-shoot" src="https://assets.mixkit.co/active_storage/sfx/2771/2771-preview.mp3" preload="auto"></audio>
        <audio id="sfx-exp" src="https://assets.mixkit.co/active_storage/sfx/2772/2772-preview.mp3" preload="auto"></audio>
        <audio id="bgm-menu" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" loop preload="auto"></audio>
        <audio id="bgm-game" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3" loop preload="auto"></audio>

        <div id="auth-menu" class="menu-screen">
            <h1>WARSHIP RACING</h1>
            <p>Login ke Server Global</p>
            <input type="text" id="usernameInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="loginBtn" class="menu-btn primary-btn">LOGIN</button>
            <button id="registerBtn" class="menu-btn secondary-btn">DAFTAR</button>
            <p id="authMsg" style="color: #ff4444; margin-top: 15px;"></p>
        </div>

        <div id="main-menu" class="menu-screen hidden">
            <h1 id="menuTitleText">MENU UTAMA</h1>
            <p>Kapten <strong id="playerName" style="color:#00fbff;"></strong></p>
            <p style="color:#ffdd00; font-size:22px; font-weight:bold;">Uang: $<span id="menuMoney">0</span></p>
            <button id="startBtn" class="menu-btn primary-btn">MULAI GAME</button>
            <button id="shopBtn" class="menu-btn gold-btn">GARASI / SHOP</button>
            <button id="upgBtn" class="menu-btn green-btn">UPGRADES</button>
            <button id="showLbBtn" class="menu-btn secondary-btn">LEADERBOARD</button>
            <button id="adminBtn" class="menu-btn admin-btn hidden">⚙️ ADMIN PANEL ⚙️</button>
            <div style="display:flex; gap:10px;">
                <button id="creditsBtn" class="menu-btn secondary-btn" style="width: 105px; font-size: 12px;">CREDITS</button>
                <button id="langBtn" class="menu-btn secondary-btn" style="width: 105px; font-size: 12px;">BHS: ID</button>
            </div>
            <button id="logoutBtn" class="menu-btn" style="background: #555; margin-top: 10px;">LOGOUT</button>
        </div>

        <div id="credits-menu" class="menu-screen hidden">
            <h1>CREDITS</h1>
            <p style="font-size: 20px;">Game Developer & Designer<br><br><strong style="color:#00fbff; font-size:26px;">@windy</strong></p>
            <button id="closeCredBtn" class="menu-btn secondary-btn">KEMBALI</button>
        </div>

        <div id="leaderboard-menu" class="menu-screen hidden">
            <h1>GLOBAL LEADERBOARD</h1>
            <div class="data-box" id="leaderboard-box">Sedang memuat data...</div>
            <button id="closeLbBtn" class="menu-btn secondary-btn">KEMBALI</button>
        </div>

        <div id="game-over-menu" class="menu-screen hidden">
            <h1 style="color: #ff4444;">KAPAL HANCUR!</h1>
            <p id="gameOverDesc" style="font-size: 20px; color: #ffdd00; font-weight: bold;"></p>
            <button id="retryBtn" class="menu-btn primary-btn">MAIN LAGI</button>
            <button id="backToMenuBtn" class="menu-btn secondary-btn">MENU UTAMA</button>
        </div>

        <div id="ui">
            <div>SCORE: <span id="score">0</span></div>
            <div id="coin-ui">MONEY: $<span id="game-money">0</span></div>
            <div id="player-hp-container"><div id="player-hp-fill"></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="controls">
            <div id="upBtn" class="btn">▲</div>
            <div id="downBtn" class="btn">▼</div>
        </div>
        <div id="action-controls">
            <div id="skillBtn" class="btn hidden">⚡</div>
        </div>
    </div>

    <script>
        // FIREBASE INIT
        const firebaseConfig = { databaseURL: "https://warshiprace-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let userData = null;

        // Fungsi Ganti Menu
        function switchMenu(targetId) {
            document.querySelectorAll('.menu-screen').forEach(s => s.classList.add("hidden"));
            document.getElementById("ui").style.display = "none";
            document.getElementById("controls").style.display = "none";
            document.getElementById("action-controls").style.display = "none";
            
            if (targetId === "game") {
                document.getElementById("ui").style.display = "block";
                document.getElementById("controls").style.display = "flex";
                document.getElementById("action-controls").style.display = "flex";
            } else {
                const screen = document.getElementById(targetId);
                if (screen) screen.classList.remove("hidden");
            }
        }

        // --- FIXED: SEMUA EVENT LISTENER TOMBOL ---

        // Tombol Auth
        document.getElementById("loginBtn").onclick = login;
        document.getElementById("registerBtn").onclick = () => alert("Gunakan Login langsung (akun otomatis tersimpan jika benar)");

        // Tombol Menu Utama
        document.getElementById("startBtn").onclick = () => {
            bgmMenu.pause();
            bgmGame.play().catch(() => {});
            switchMenu("game");
        };
        document.getElementById("shopBtn").onclick = () => alert("Garasi/Shop sedang dalam tahap pengembangan.");
        document.getElementById("upgBtn").onclick = () => alert("Upgrade sedang dalam tahap pengembangan.");
        document.getElementById("showLbBtn").onclick = () => switchMenu("leaderboard-menu");
        document.getElementById("creditsBtn").onclick = () => switchMenu("credits-menu");
        document.getElementById("logoutBtn").onclick = () => location.reload();

        // Tombol Kembali/Tutup
        document.getElementById("closeCredBtn").onclick = () => switchMenu("main-menu");
        document.getElementById("closeLbBtn").onclick = () => switchMenu("main-menu");
        document.getElementById("backToMenuBtn").onclick = () => switchMenu("main-menu");
        document.getElementById("retryBtn").onclick = () => switchMenu("game");

        // BGM Control
        const bgmMenu = document.getElementById("bgm-menu");
        const bgmGame = document.getElementById("bgm-game");
        bgmMenu.volume = 0.3; bgmGame.volume = 0.3;

        function playMenuBGM() {
            bgmGame.pause();
            bgmMenu.currentTime = 0;
            bgmMenu.play().catch(() => {});
        }

        function login() {
            let u = document.getElementById("usernameInput").value.trim();
            let p = document.getElementById("passwordInput").value.trim();
            if(!u || !p) return alert("Isi Username & Password!");
            
            document.getElementById("loading-overlay").style.display = "flex";
            db.ref('users/' + u).once('value').then(snap => {
                document.getElementById("loading-overlay").style.display = "none";
                if(snap.exists() && snap.val().password === p) {
                    currentUser = u;
                    userData = snap.val();
                    document.getElementById("playerName").innerText = currentUser;
                    document.getElementById("menuMoney").innerText = userData.money || 0;
                    
                    if(currentUser === "devloper") document.getElementById("adminBtn").classList.remove("hidden");
                    
                    playMenuBGM();
                    switchMenu("main-menu");
                } else {
                    document.getElementById("authMsg").innerText = "Login Gagal! Cek kembali password.";
                }
            }).catch(e => {
                document.getElementById("loading-overlay").style.display = "none";
                alert("Gagal terhubung ke Firebase. Pastikan koneksi internet aktif.");
            });
        }

        // Canvas Setup
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

    </script>
</body>
</html>

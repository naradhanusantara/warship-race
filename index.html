<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warship Racing Global - Fix Ultimate</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #004d99; }
        canvas { display: block; position: absolute; top:0; left:0; z-index: 1; }
        
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 26, 51, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; text-align: center; }
        .hidden { display: none !important; }
        
        h1 { font-size: 36px; color: #00fbff; text-shadow: 2px 2px #000; margin-bottom: 10px; }
        .menu-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; margin: 8px; color: white; border: 3px solid #fff; border-radius: 12px; cursor: pointer; background: #0077be; width: 240px; pointer-events: auto; }
        .primary-btn { background: #ff4444; } .gold-btn { background: #d4af37; color: #000; } .green-btn { background: #28a745; }
        
        input { padding: 12px; margin: 8px; width: 220px; border-radius: 8px; border: 2px solid #00fbff; background: #001a33; color: white; text-align: center; outline: none; }
        .data-box { background: rgba(0,0,0,0.6); border: 2px solid #00fbff; border-radius: 10px; width: 340px; max-height: 250px; overflow-y: auto; padding: 15px; margin-bottom: 20px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 10px; border-radius: 8px; text-align: left; }

        #ui { position: absolute; top: 15px; left: 20px; color: white; font-size: 18px; font-weight: bold; z-index: 100; display: none; text-shadow: 2px 2px #000; }
        #hp-bar-bg { width: 200px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 5px; margin-top: 5px; }
        #hp-bar-fill { width: 100%; height: 100%; background: #00ffaa; }

        #controls { position: absolute; right: 30px; bottom: 30px; display: none; flex-direction: column; gap: 15px; z-index: 100; }
        #action-controls { position: absolute; left: 30px; bottom: 30px; display: none; gap: 15px; z-index: 100; }
        .btn-circle { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; border: 3px solid white; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="auth-menu" class="menu-screen">
        <h1>WARSHIP RACING</h1>
        <input type="text" id="usernameInput" placeholder="Username">
        <input type="password" id="passwordInput" placeholder="Password">
        <button class="menu-btn primary-btn" id="loginBtn">LOGIN</button>
        <button class="menu-btn" id="registerBtn">DAFTAR GLOBAL</button>
        <p id="authMsg" style="color:red;"></p>
    </div>

    <div id="main-menu" class="menu-screen hidden">
        <h1>MENU UTAMA</h1>
        <p>Kapten: <span id="pName" style="color:#00fbff;"></span> | Uang: $<span id="pMoney">0</span></p>
        <button class="menu-btn primary-btn" id="startBtn">START GAME</button>
        <button class="menu-btn gold-btn" id="shopBtn">GARASI</button>
        <button class="menu-btn green-btn" id="upgBtn">UPGRADE</button>
        <button class="menu-btn" id="creditsBtn">CREDITS</button>
        <button class="menu-btn" id="logoutBtn" style="background:#555">LOGOUT</button>
    </div>

    <div id="credits-menu" class="menu-screen hidden">
        <h1>CREDITS</h1>
        <p>Game Developer & Designer</p>
        <h2 style="color:#00fbff;">@windy</h2>
        <button class="menu-btn primary-btn" onclick="showMenu('main-menu')">BACK</button>
    </div>

    <div id="shop-menu" class="menu-screen hidden">
        <h1>GARASI</h1>
        <div class="data-box" id="shop-box"></div>
        <button class="menu-btn" onclick="showMenu('main-menu')">BACK</button>
    </div>

    <div id="ui">
        SCORE: <span id="scoreText">0</span> | MONEY: $<span id="moneyText">0</span>
        <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn-circle" id="upBtn">▲</div>
        <div class="btn-circle" id="downBtn">▼</div>
    </div>
    <div id="action-controls">
        <div class="btn-circle hidden" id="skillBtn">⚡</div>
    </div>
</div>

<script>
    // 1. CONFIG
    const firebaseConfig = { databaseURL: "https://warshiprace-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const shipData = [
        { id: 0, name: "Speedboat", spd: 8, hp: 100, price: 0, icon: "⚡", skill: "DASH" },
        { id: 1, name: "Jet Ski", spd: 11, hp: 60, price: 500, icon: "🔥", skill: "BOOST" },
        { id: 5, name: "Arleigh Burke", spd: 7, hp: 250, price: 25000, icon: "🎯", skill: "SHOOT" },
        { id: 6, name: "CVN-78 Admin", spd: 5, hp: 500, price: 999999, icon: "🛩️", skill: "AIRSTRIKE", isAdmin: true }
    ];

    let currentUser = null, userData = null;
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function showMenu(id) {
        document.querySelectorAll('.menu-screen').forEach(m => m.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // 2. AUTH
    document.getElementById('registerBtn').onclick = () => {
        let u = document.getElementById('usernameInput').value.trim().toLowerCase();
        let p = document.getElementById('passwordInput').value.trim();
        if(!u || !p) return;
        db.ref('users/'+u).set({ password:p, money:1000, highscore:0, owned:[0], equipped:0 }).then(() => alert("Berhasil!"));
    };

    document.getElementById('loginBtn').onclick = () => {
        let u = document.getElementById('usernameInput').value.trim().toLowerCase();
        let p = document.getElementById('passwordInput').value.trim();
        db.ref('users/'+u).once('value').then(snap => {
            if(snap.exists() && snap.val().password === p) {
                currentUser = u; userData = snap.val();
                if(!userData.owned) userData.owned = [0];
                document.getElementById('pName').innerText = u;
                document.getElementById('pMoney').innerText = userData.money;
                showMenu('main-menu');
            } else { alert("Login Salah!"); }
        });
    };

    document.getElementById('logoutBtn').onclick = () => { currentUser = null; showMenu('auth-menu'); };

    // 3. SHOP
    document.getElementById('shopBtn').onclick = () => {
        const box = document.getElementById('shop-box'); box.innerHTML = "";
        shipData.forEach(s => {
            if(s.isAdmin && currentUser !== 'devloper') return;
            let isOwned = userData.owned.includes(s.id);
            let div = document.createElement('div'); div.className = 'shop-item';
            div.innerHTML = `<div><b>${s.name}</b></div><button class="menu-btn" style="width:100px" onclick="buy(${s.id}, ${s.price})">${isOwned ? "PAKAI" : "BELI"}</button>`;
            box.appendChild(div);
        });
        showMenu('shop-menu');
    };

    window.buy = (id, price) => {
        if(userData.owned.includes(id)) { userData.equipped = id; }
        else if(userData.money >= price) { userData.money -= price; userData.owned.push(id); userData.equipped = id; }
        db.ref('users/'+currentUser).set(userData);
        document.getElementById('pMoney').innerText = userData.money;
        showMenu('main-menu');
    };

    // 4. GAME ENGINE
    let gameActive = false, score = 0, earnedMoney = 0, hp = 100, maxHp = 100;
    let boatY = 0, obstacles = [], bullets = [], currentShip = null;
    let moveUp = false, moveDown = false;

    document.getElementById('startBtn').onclick = () => {
        currentShip = shipData.find(s => s.id == userData.equipped);
        score = 0; earnedMoney = 0; hp = currentShip.hp; maxHp = currentShip.hp;
        boatY = canvas.height/2; obstacles = []; bullets = [];
        gameActive = true;
        document.getElementById('ui').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('action-controls').style.display = 'flex';
        document.getElementById('skillBtn').classList.remove('hidden');
        document.getElementById('skillBtn').innerText = currentShip.icon;
        document.querySelectorAll('.menu-screen').forEach(m => m.classList.add('hidden'));
        loop();
    };

    function loop() {
        if(!gameActive) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        if(moveUp && boatY > 50) boatY -= currentShip.spd;
        if(moveDown && boatY < canvas.height-50) boatY += currentShip.spd;

        if(Math.random() < 0.03) obstacles.push({ x: canvas.width, y: Math.random()*canvas.height, spd: 6+(score/50) });

        obstacles.forEach((o, i) => {
            o.x -= o.spd;
            if(o.x < -50) { obstacles.splice(i, 1); score++; earnedMoney += 10; }
            if(Math.abs(o.x - 120) < 40 && Math.abs(o.y - boatY) < 30) {
                hp -= 20; obstacles.splice(i, 1);
                if(hp <= 0) { gameActive = false; alert("Game Over! Skor: " + score); finish(); }
            }
        });

        bullets.forEach((b, i) => {
            b.x += 15;
            if(b.x > canvas.width) bullets.splice(i, 1);
            obstacles.forEach((o, oi) => {
                if(Math.abs(b.x - o.x) < 40 && Math.abs(b.y - o.y) < 40) {
                    obstacles.splice(oi, 1); bullets.splice(i, 1); score++; earnedMoney += 20;
                }
            });
        });

        document.getElementById('scoreText').innerText = score;
        document.getElementById('moneyText').innerText = earnedMoney;
        document.getElementById('hp-bar-fill').style.width = (hp/maxHp*100) + "%";
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        // Player (Sederhana agar tidak crash)
        ctx.fillStyle = "#00fbff";
        ctx.fillRect(100, boatY-20, 60, 30);
        // Obstacles
        ctx.fillStyle = "red";
        obstacles.forEach(o => { ctx.beginPath(); ctx.arc(o.x, o.y, 20, 0, 7); ctx.fill(); });
        // Bullets
        ctx.fillStyle = "yellow";
        bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 4));
    }

    function finish() {
        if(score > userData.highscore) userData.highscore = score;
        userData.money += earnedMoney;
        db.ref('users/'+currentUser).set(userData);
        location.reload();
    }

    // Controls
    document.getElementById('upBtn').ontouchstart = () => moveUp = true;
    document.getElementById('upBtn').ontouchend = () => moveUp = false;
    document.getElementById('downBtn').ontouchstart = () => moveDown = true;
    document.getElementById('downBtn').ontouchend = () => moveDown = false;
    document.getElementById('skillBtn').onclick = () => {
        bullets.push({ x: 160, y: boatY, spd: 15 });
    };
</script>
</body>
</html>
